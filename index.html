<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Redline Franchise Network</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

        <style>
            :root {
                --ink: #14161a;
                --panel: #1c1f26;
                --panel2: #242833;
                --line: #333947;
                --red: #e82e2f;
                --hiviz: #ffd23f;
                --silver: #c9ced8;
                --muted: #8a93a4;
                --text: #eef0f4;
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                min-height: 100%;
                box-sizing: border-box;
                background: var(--ink);
                background-image: radial-gradient(ellipse 90% 60% at 50% -10%, rgba(232, 46, 47, 0.14), transparent);
                font-family: "Montserrat", Helvetica, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                display: flex;
                flex-direction: column;
            }

            .rl-trim {
                display: flex;
                flex-direction: column;
                gap: 3px;
                height: 14px;
                flex: none;
            }
            .rl-trim span {
                flex: 1;
            }
            .rl-trim .y {
                background: var(--hiviz);
            }
            .rl-trim .s {
                background: var(--silver);
            }

            .staticrypt-page {
                width: 100%;
                max-width: 420px;
                margin: auto;
                padding: 40px 20px;
                box-sizing: border-box;
            }

            .rl-logo {
                display: block;
                width: 260px;
                max-width: 80%;
                margin: 0 auto 26px;
            }
            .rl-logo svg {
                display: block;
                width: 100%;
                height: auto;
            }
            .rl-logo svg path:not(.st0),
            .rl-logo svg polygon:not(.st0) {
                fill: #f0f2f5;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 10px;
                margin: 0 auto;
                padding: 34px 34px 30px;
                text-align: center;
                box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
            }

            .staticrypt-instructions {
                margin: 0 0 22px;
            }

            .staticrypt-title {
                font-size: 15px;
                font-weight: 800;
                text-transform: uppercase;
                letter-spacing: 0.18em;
                color: var(--text);
                margin: 0 0 10px;
            }

            .staticrypt-instructions p:not(.staticrypt-title) {
                font-size: 13px;
                font-weight: 500;
                line-height: 1.6;
                color: var(--muted);
                margin: 0;
            }

            .staticrypt-hr {
                margin: 0 0 22px;
                border: 0;
                border-top: 1px solid var(--line);
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box;
                font-size: 14px;
                font-family: inherit;
                font-weight: 500;
                color: var(--text);
                outline: 0;
                padding: 15px 44px 15px 15px;
                width: 100%;
            }

            .staticrypt-form input::placeholder {
                color: var(--muted);
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: var(--ink);
                border: 1px solid var(--line);
                border-radius: 6px;
                width: 100%;
                margin: 0 0 16px;
                box-sizing: border-box;
            }

            .staticrypt-password-container:focus-within {
                border-color: var(--red);
                box-shadow: 0 0 0 2px rgba(232, 46, 47, 0.3);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                opacity: 55%;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                filter: invert(90%);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 18px;
                font-size: 12.5px;
                font-weight: 500;
                color: var(--silver);
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.35);
                margin-right: 0.9em;
                accent-color: var(--red);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                letter-spacing: 0.14em;
                font-family: inherit;
                font-weight: 800;
                outline: 0;
                background: var(--red);
                width: 100%;
                border: 0;
                border-radius: 6px;
                padding: 15px;
                color: #ffffff;
                font-size: 13.5px;
                cursor: pointer;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active {
                filter: brightness(110%);
            }

            .staticrypt-form .staticrypt-decrypt-button:focus-visible {
                outline: 3px solid var(--hiviz);
                outline-offset: 2px;
            }

            .rl-foot {
                text-align: center;
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--muted);
                margin-top: 22px;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--ink);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid var(--line);
                border-right-color: var(--red);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            @media (prefers-reduced-motion: reduce) {
                .staticrypt-spinner {
                    animation-duration: 2s;
                }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>
